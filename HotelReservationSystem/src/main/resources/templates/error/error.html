<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; }
        .error-container { text-align: center; padding: 40px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 error-container border-0 border-top border-4 border-secondary">
                <h1 class="display-1 fw-bold text-secondary">Oops</h1>
                <h2 class="mb-3">Terjadi Kesalahan yang Tidak Terduga.</h2>
                <p class="lead text-muted mb-4">Mohon maaf, sistem sedang mengalami gangguan.</p>
                <a th:href="@{/}" class="btn btn-primary btn-lg">Kembali ke Home</a>
            </div>
        </div>
    </div>
</body>
</html>
