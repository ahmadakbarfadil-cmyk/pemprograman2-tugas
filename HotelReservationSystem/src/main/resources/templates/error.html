<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Error</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center py-5">

            <!-- Error Icon & Code -->
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle-fill text-danger"
                   style="font-size: 5rem;"></i>
            </div>

            <h1 class="display-1 fw-bold text-danger"
                th:text="${errorCode != null ? errorCode : '500'}">500</h1>

            <h3 class="mb-3 text-dark fw-semibold">
                <span th:if="${errorCode == '404'}">Halaman Tidak Ditemukan</span>
                <span th:if="${errorCode == '400'}">Permintaan Tidak Valid</span>
                <span th:unless="${errorCode == '404' or errorCode == '400'}">Terjadi Kesalahan</span>
            </h3>

            <div class="alert alert-danger d-inline-block text-start mb-4">
                <i class="bi bi-exclamation-circle-fill me-2"></i>
                <span th:text="${errorMessage != null ? errorMessage : 'Terjadi kesalahan yang tidak diketahui.'}">
                    Terjadi kesalahan.
                </span>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-4">
                <a href="/" class="btn btn-primary btn-lg">
                    <i class="bi bi-house-door me-2"></i>Kembali ke Dashboard
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-arrow-left me-2"></i>Halaman Sebelumnya
                </a>
            </div>

        </div>
    </div>

</div>
</body>
</html>
